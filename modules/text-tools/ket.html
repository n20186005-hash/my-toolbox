<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剑桥英语单词连连看 - 闯关版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义过渡动画 */
        .word-card {
            transition: all 0.3s ease;
        }
        /* 成功匹配后的高亮与消失动画 */
        .match-success {
            color: #2563eb !important; /* 蓝色 */
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            font-weight: bold;
            transform: scale(1.05);
        }
        .match-hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        /* 匹配失败的报错样式 */
        .match-error {
            color: #dc2626 !important; /* 红色 */
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            animation: shake 0.4s ease-in-out;
        }
        /* 选中状态 */
        .selected {
            border-color: #fbbf24 !important;
            background-color: #fef3c7 !important;
            transform: scale(1.02);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* 提示高亮动画 */
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0px 0px rgba(251, 191, 36, 0); border-color: #e5e7eb; }
            50% { box-shadow: 0 0 20px 8px rgba(251, 191, 36, 0.6); border-color: #f59e0b; background-color: #fef3c7; transform: scale(1.03); }
        }
        .hint-glow {
            animation: pulseGlow 1.5s ease-in-out;
            z-index: 10;
            position: relative;
        }

        /* 错误抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* 进度条动画 */
        #progressBar {
            transition: width 0.5s ease-in-out;
        }

        /* 夸夸飘字动画基础样式 */
        .praise-text {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            font-size: 2.5rem;
            font-weight: 900;
            color: #ec4899; /* 玫瑰粉色 */
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 4px 10px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 100;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen font-sans text-gray-800 selection:bg-transparent overflow-x-hidden">

    <!-- 主容器 -->
    <div class="max-w-4xl mx-auto p-4 sm:p-6 md:p-8">
        
        <!-- 头部标题 -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-blue-600 mb-2 tracking-wider">🌟 英语单词连连看 🌟</h1>
            <p class="text-gray-500 text-sm md:text-base">听发音，找朋友！挑战自我，向更高词汇量进发！</p>
        </header>

        <!-- 1. 选关界面 -->
        <div id="levelSelection" class="bg-white rounded-2xl shadow-xl p-8 text-center max-w-lg mx-auto border-4 border-blue-100">
            <h2 class="text-2xl font-bold text-gray-700 mb-6">第一步：选择词汇难度</h2>
            
            <div class="grid grid-cols-1 gap-4 max-h-[50vh] overflow-y-auto pr-2 pb-2">
                <!-- 基础级别 -->
                <button onclick="showCountSelection('level1')" class="w-full py-4 rounded-xl text-lg font-bold bg-green-100 text-green-700 hover:bg-green-200 border-2 border-green-300 transition-colors">剑桥 1级 (Pre A1 Starters)</button>
                <button onclick="showCountSelection('level2')" class="w-full py-4 rounded-xl text-lg font-bold bg-blue-100 text-blue-700 hover:bg-blue-200 border-2 border-blue-300 transition-colors">剑桥 2级 (A1 Movers)</button>
                <button onclick="showCountSelection('level3')" class="w-full py-4 rounded-xl text-lg font-bold bg-purple-100 text-purple-700 hover:bg-purple-200 border-2 border-purple-300 transition-colors">剑桥 3级 (A2 Flyers)</button>
                <button onclick="showCountSelection('ket')" class="w-full py-4 rounded-xl text-lg font-bold bg-red-100 text-red-700 hover:bg-red-200 border-2 border-red-300 transition-colors">KET 核心词汇 (A2 Key)</button>
                
                <!-- 新增高阶级别 -->
                <button onclick="showCountSelection('pet')" class="w-full py-4 rounded-xl text-lg font-bold bg-teal-100 text-teal-700 hover:bg-teal-200 border-2 border-teal-300 transition-colors">PET 核心词汇 (B1 Preliminary)</button>
                <button onclick="showCountSelection('cae')" class="w-full py-4 rounded-xl text-lg font-bold bg-cyan-100 text-cyan-700 hover:bg-cyan-200 border-2 border-cyan-300 transition-colors">CAE 核心词汇 (C1 Advanced)</button>
                <button onclick="showCountSelection('cpe')" class="w-full py-4 rounded-xl text-lg font-bold bg-indigo-100 text-indigo-700 hover:bg-indigo-200 border-2 border-indigo-300 transition-colors">CPE 核心词汇 (C2 Proficiency)</button>
                <button onclick="showCountSelection('ielts')" class="w-full py-4 rounded-xl text-lg font-bold bg-fuchsia-100 text-fuchsia-700 hover:bg-fuchsia-200 border-2 border-fuchsia-300 transition-colors">IELTS 雅思高频词汇</button>
            </div>
            
            <!-- 查看学习记录按钮 -->
            <button onclick="showHistory()" class="mt-6 text-blue-500 hover:text-blue-700 font-bold underline flex items-center justify-center w-full gap-1">
                📊 查看近期学习记录
            </button>
        </div>

        <!-- 2. 题量选择界面 -->
        <div id="countSelection" class="hidden bg-white rounded-2xl shadow-xl p-8 text-center max-w-lg mx-auto border-4 border-yellow-100">
            <button onclick="goBackToLevel()" class="mb-4 text-sm text-gray-500 hover:text-gray-800 flex items-center justify-center w-full">
                ⬅ 返回重选难度
            </button>
            <h2 class="text-2xl font-bold text-gray-700 mb-2">第二步：选择挑战词汇量</h2>
            <p class="text-gray-500 mb-6 text-sm">每次6题，轻松有趣不厌学！你想挑战多少个？</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startSession(18)" class="py-6 rounded-xl text-xl font-bold bg-gray-100 text-gray-700 hover:bg-yellow-100 hover:text-yellow-700 hover:border-yellow-400 border-2 border-transparent transition-all shadow-sm">18 个<br><span class="text-xs text-yellow-600 font-normal">热身 (3关)</span></button>
                <button onclick="startSession(36)" class="py-6 rounded-xl text-xl font-bold bg-gray-100 text-gray-700 hover:bg-orange-100 hover:text-orange-700 hover:border-orange-400 border-2 border-transparent transition-all shadow-sm">36 个<br><span class="text-xs text-orange-600 font-normal">进阶 (6关)</span></button>
                <button onclick="startSession(72)" class="py-6 rounded-xl text-xl font-bold bg-gray-100 text-gray-700 hover:bg-rose-100 hover:text-rose-700 hover:border-rose-400 border-2 border-transparent transition-all shadow-sm">72 个<br><span class="text-xs text-rose-600 font-normal">达人 (12关)</span></button>
                <button onclick="startSession(108)" class="py-6 rounded-xl text-xl font-bold bg-gray-100 text-gray-700 hover:bg-red-100 hover:text-red-700 hover:border-red-400 border-2 border-transparent transition-all shadow-sm shadow-md">108 个<br><span class="text-xs text-red-500 font-normal">大师挑战 (18关)</span></button>
            </div>
        </div>

        <!-- 3. 游戏界面 -->
        <div id="gameScreen" class="hidden">
            <!-- 顶部状态与进度条 -->
            <div class="bg-white p-4 rounded-xl shadow-sm border-2 border-blue-100 mb-6">
                <div class="flex flex-wrap justify-between items-center gap-2 mb-3">
                    
                    <div class="flex flex-wrap items-center gap-2">
                        <button onclick="quitGame()" class="px-3 py-1.5 bg-red-100 text-red-600 rounded-lg font-bold hover:bg-red-200 transition-colors text-sm">放弃</button>
                        
                        <!-- 提示按钮 -->
                        <button onclick="useHint()" id="hintBtn" class="flex items-center gap-1 px-3 py-1.5 bg-yellow-100 text-yellow-700 rounded-lg font-bold hover:bg-yellow-200 transition-colors text-sm border-2 border-yellow-200">
                            💡 提示 <span id="hintCountDisplay" class="bg-yellow-400 text-white rounded-full px-1.5 text-xs">3</span>
                        </button>

                        <!-- 中文发音控制开关 -->
                        <button onclick="toggleChineseAudio()" id="audioToggleBtn" class="flex items-center gap-1 px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg font-bold hover:bg-indigo-100 transition-colors text-sm border-2 border-indigo-200">
                            <span class="hidden sm:inline">中文发音</span>
                            <span id="audioIcon" class="text-base">🔊</span>
                        </button>

                        <!-- 夸夸特效/弹幕开关 -->
                        <button onclick="togglePraise()" id="praiseToggleBtn" class="flex items-center gap-1 px-3 py-1.5 bg-pink-50 text-pink-600 rounded-lg font-bold hover:bg-pink-100 transition-colors text-sm border-2 border-pink-200">
                            <span class="hidden sm:inline">夸夸特效</span>
                            <span id="praiseIcon" class="text-base">✨</span>
                        </button>
                    </div>

                    <!-- 中央计时器 -->
                    <div class="text-center font-mono text-xl font-bold text-gray-600 bg-gray-100 px-4 py-1 rounded-full border border-gray-200" id="timeDisplay">
                        🕒 00:00
                    </div>

                    <div class="text-base md:text-lg font-bold text-blue-600 text-right">
                        已配对: <span id="scoreDisplay" class="text-xl md:text-2xl">0</span> / <span id="targetDisplay">18</span>
                    </div>
                </div>
                <!-- 进度条 -->
                <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                    <div id="progressBar" class="bg-gradient-to-r from-blue-400 to-blue-600 h-3 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- 游戏主棋盘区 -->
            <div class="relative">
                <!-- 棋盘 -->
                <div class="grid grid-cols-2 gap-4 md:gap-12 bg-white p-6 rounded-2xl shadow-xl border-4 border-blue-100 min-h-[450px]">
                    <!-- 左侧英文 -->
                    <div class="flex flex-col gap-3" id="englishColumn"></div>
                    <!-- 右侧中文 -->
                    <div class="flex flex-col gap-3" id="chineseColumn"></div>
                </div>

                <!-- 回合通关遮罩层 -->
                <div id="roundTransition" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm rounded-2xl flex flex-col items-center justify-center z-10">
                    <div class="text-6xl mb-4">🌟</div>
                    <h3 class="text-3xl font-bold text-blue-600 mb-2">太棒了！</h3>
                    <p class="text-gray-600 font-medium text-lg">准备进入下一关...</p>
                </div>
            </div>
        </div>

        <!-- 4. 游戏最终通关提示层 -->
        <div id="winScreen" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 backdrop-blur-sm">
            <div class="bg-white p-6 md:p-10 rounded-3xl text-center shadow-2xl transform scale-105 border-8 border-yellow-400 max-w-md w-full mx-4">
                <div class="text-6xl md:text-8xl mb-4">🏆</div>
                <h2 class="text-3xl md:text-4xl font-extrabold text-yellow-500 mb-2">挑战成功！</h2>
                <p class="text-gray-500 mb-6 text-sm md:text-base">你完成了 <span id="finalScore" class="font-bold text-blue-600 text-xl"></span> 个单词的配对！</p>
                
                <!-- 数据结算面板 -->
                <div class="grid grid-cols-3 gap-2 md:gap-4 mb-8">
                    <div class="bg-blue-50 py-3 px-1 rounded-xl border border-blue-100">
                        <div class="text-xs md:text-sm text-gray-500 mb-1">⏱️ 用时</div>
                        <div class="text-lg md:text-xl font-bold text-blue-600" id="finalTime">00:00</div>
                    </div>
                    <div class="bg-green-50 py-3 px-1 rounded-xl border border-green-100">
                        <div class="text-xs md:text-sm text-gray-500 mb-1">🎯 准确率</div>
                        <div class="text-lg md:text-xl font-bold text-green-600" id="finalAccuracy">100%</div>
                    </div>
                    <div class="bg-yellow-50 py-3 px-1 rounded-xl border border-yellow-100">
                        <div class="text-xs md:text-sm text-gray-500 mb-1">⭐ 评分</div>
                        <div class="text-lg md:text-xl font-extrabold text-yellow-500" id="finalGrade">S</div>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="goBackToLevel()" class="w-full px-6 py-4 bg-blue-500 text-white rounded-xl text-lg md:text-xl font-bold hover:bg-blue-600 shadow-lg shadow-blue-500/30 transition-all">开启新挑战</button>
                </div>
            </div>
        </div>

        <!-- 学习记录历史展示层 -->
        <div id="historyScreen" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 backdrop-blur-sm">
            <div class="bg-white p-6 md:p-8 rounded-3xl w-full max-w-2xl max-h-[85vh] flex flex-col mx-4 shadow-2xl border-4 border-blue-200">
                <h2 class="text-2xl font-extrabold mb-6 text-center text-blue-600">🏆 近期学习记录</h2>
                <div id="historyList" class="overflow-y-auto flex-1 flex flex-col gap-3 pr-2">
                    <!-- 动态加载记录 -->
                </div>
                <button onclick="hideHistory()" class="mt-6 w-full py-4 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors text-lg">关闭</button>
            </div>
        </div>

    </div>

    <script>

        function parseWordList(rawStr) {
            return rawStr.split('|').map((pair, index) => {
                const parts = pair.split(':');
                return { id: index + 1, en: parts[0], zh: parts[1] };
            });
        }

        // ==========================================
        // 【核心修复：手机端原生语音模块引擎安全激活】
        // ==========================================
        const synth = window.speechSynthesis;
        window.currentUtterance = null; // 【修复重点】挂载到 window 彻底防止 iOS Safari 垃圾回收机制直接截断语音
        let isSpeechInitialized = false; // 标记是否已经进行了初次物理唤醒

        // 【修复重点】手机端浏览器严格限制自动播放音频，必须在用户第一次物理点击屏幕时"唤醒"语音引擎
        function unlockSpeechEngine() {
            if (isSpeechInitialized || !synth) return;
            const unlockMsg = new SpeechSynthesisUtterance(' '); // 防止部分引擎因空字符串报错
            unlockMsg.volume = 0; 
            synth.speak(unlockMsg);
            isSpeechInitialized = true;
            // 唤醒成功后移除监听
            document.removeEventListener('click', unlockSpeechEngine);
            document.removeEventListener('touchstart', unlockSpeechEngine);
        }
        document.addEventListener('click', unlockSpeechEngine);
        document.addEventListener('touchstart', unlockSpeechEngine);

        function speakText(text, isEnglish) {
            if (!synth) return;
            
            // 【修复重点】仅在正在说话或排队时取消，避免 Android TTS 队列直接崩溃
            if (synth.speaking || synth.pending) {
                synth.cancel();
            }

            // 【修复重点】移除 setTimeout 延迟。
            // 手机浏览器要求发声方法必须紧跟在用户手势（如 Click 事件）的同一执行栈内调用，使用 setTimeout 会被静默拦截。
            window.currentUtterance = new SpeechSynthesisUtterance(text);
            
            // 【修复重点】部分低端安卓机的基础 TTS 引擎缺少 'en-GB' 包会导致静默失败，改用兼容性更高的 'en-US'
            window.currentUtterance.lang = isEnglish ? 'en-US' : 'zh-CN';
            window.currentUtterance.rate = 0.9; 
            window.currentUtterance.pitch = 1.0;
            window.currentUtterance.volume = 1.0;
            
            synth.speak(window.currentUtterance);
        }

        function saveHistory(levelName, wordCount, timeStr, accuracy, grade) {
            const history = JSON.parse(localStorage.getItem('cambridgeWordGameHistory') || '[]');
            const record = {
                date: new Date().toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                level: levelName,
                words: wordCount,
                time: timeStr,
                accuracy: accuracy,
                grade: grade
            };
            history.unshift(record); 
            if (history.length > 30) history.pop(); 
            localStorage.setItem('cambridgeWordGameHistory', JSON.stringify(history));
        }

        function useHint() {
            if (hintsRemaining <= 0 || isLocked) return;

            const unMatchedEn = Array.from(document.querySelectorAll('#englishColumn .word-card:not(.match-hide)'));
            if (unMatchedEn.length === 0) return;

            hintsRemaining--;
            updateHintDisplay();

            let targetId = null;
            if (selectedEnglishItem) {
                targetId = selectedEnglishItem.dataset.id;
            } else if (selectedChineseItem) {
                targetId = selectedChineseItem.dataset.id;
            } else {
                const randomEn = unMatchedEn[Math.floor(Math.random() * unMatchedEn.length)];
                targetId = randomEn.dataset.id;
            }

            const targetEnEl = document.querySelector(`#englishColumn .word-card[data-id="${targetId}"]`);
            const targetZhEl = document.querySelector(`#chineseColumn .word-card[data-id="${targetId}"]`);

            if (targetEnEl && targetZhEl) {
                targetEnEl.classList.add('hint-glow');
                targetZhEl.classList.add('hint-glow');
                
                setTimeout(() => {
                    targetEnEl.classList.remove('hint-glow');
                    targetZhEl.classList.remove('hint-glow');
                }, 1500);
            }
        }

        function updateHintDisplay() {
            const countDisplay = document.getElementById('hintCountDisplay');
            const hintBtn = document.getElementById('hintBtn');
            countDisplay.innerText = hintsRemaining;
            
            if (hintsRemaining <= 0) {
                hintBtn.classList.remove('bg-yellow-100', 'text-yellow-700', 'hover:bg-yellow-200', 'border-yellow-200');
                hintBtn.classList.add('bg-gray-100', 'text-gray-400', 'border-gray-200', 'cursor-not-allowed');
                countDisplay.classList.remove('bg-yellow-400');
                countDisplay.classList.add('bg-gray-400');
            } else {
                hintBtn.classList.add('bg-yellow-100', 'text-yellow-700', 'hover:bg-yellow-200', 'border-yellow-200');
                hintBtn.classList.remove('bg-gray-100', 'text-gray-400', 'border-gray-200', 'cursor-not-allowed');
                countDisplay.classList.add('bg-yellow-400');
                countDisplay.classList.remove('bg-gray-400');
            }
        }

        function showPraise() {
            if (!isPraiseEnabled) return; 

            const text = praises[Math.floor(Math.random() * praises.length)];
            const colors = ['#ec4899', '#8b5cf6', '#3b82f6', '#f59e0b', '#10b981']; 
            
            const praiseEl = document.createElement('div');
            praiseEl.innerText = text;
            praiseEl.className = 'praise-text';
            praiseEl.style.color = colors[Math.floor(Math.random() * colors.length)];

            const randomXOffset = (Math.random() - 0.5) * 60; 
            const randomYOffset = (Math.random() - 0.5) * 40; 
            const randomRotation = (Math.random() - 0.5) * 30; 

            praiseEl.style.left = `calc(50% + ${randomXOffset}vw)`;
            praiseEl.style.top = `calc(50% + ${randomYOffset}vh)`;
            praiseEl.style.transform = `translate(-50%, -50%) scale(0.2) rotate(${randomRotation}deg)`;

            document.body.appendChild(praiseEl);

            requestAnimationFrame(() => {
                praiseEl.style.transform = `translate(-50%, calc(-50% - 80px)) scale(1.2) rotate(${randomRotation}deg)`;
                praiseEl.style.opacity = '1';
            });

            setTimeout(() => {
                praiseEl.style.opacity = '0';
                praiseEl.style.transform = `translate(-50%, calc(-50% - 120px)) scale(1) rotate(${randomRotation}deg)`;
                setTimeout(() => praiseEl.remove(), 800);
            }, 1200);
        }

        function startTimer() {
            clearInterval(timerInterval);
            elapsedSeconds = 0;
            document.getElementById('timeDisplay').innerText = `🕒 00:00`;
            startTime = Date.now();
            
            timerInterval = setInterval(() => {
                elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timeDisplay').innerText = `🕒 ${formatTime(elapsedSeconds)}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function formatTime(totalSeconds) {
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function shuffleArray(arr) {
            return [...arr].sort(() => 0.5 - Math.random());
        }

        // ==========================================
        // 游戏核心流程
        // ==========================================

        function startSession(count) {
            targetWordCount = count;
            completedWordsCount = 0;
            currentRoundIndex = 0;
            errorCount = 0; 
            
            hintsRemaining = Math.max(3, Math.floor(targetWordCount / 6)); 
            updateHintDisplay();
            
            const allWords = wordBank[currentLevelKey];
            let shuffled = shuffleArray(allWords);
            
            while (shuffled.length < targetWordCount) {
                shuffled = shuffled.concat(shuffleArray(allWords));
            }
            sessionWords = shuffled.slice(0, targetWordCount);

            document.getElementById('targetDisplay').innerText = targetWordCount;
            document.getElementById('scoreDisplay').innerText = completedWordsCount;
            updateProgressBar();

            document.getElementById('countSelection').classList.add('hidden');
            document.getElementById('winScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');

            startTimer();
            startRound();
        }

        function startRound() {
            roundMatchedCount = 0;
            isLocked = false;
            selectedEnglishItem = null;
            selectedChineseItem = null;

            currentPairs = sessionWords.slice(currentRoundIndex, currentRoundIndex + 6);
            renderBoard();
        }

        function renderBoard() {
            const englishCol = document.getElementById('englishColumn');
            const chineseCol = document.getElementById('chineseColumn');
            
            englishCol.innerHTML = '';
            chineseCol.innerHTML = '';

            const englishList = shuffleArray(currentPairs);
            const chineseList = shuffleArray(currentPairs);

            englishList.forEach(item => {
                const btn = createWordCard(item.en, item.id, 'en');
                englishCol.appendChild(btn);
            });

            chineseList.forEach(item => {
                const btn = createWordCard(item.zh, item.id, 'zh');
                chineseCol.appendChild(btn);
            });
        }

        function createWordCard(text, id, type) {
            const div = document.createElement('div');
            div.className = 'word-card bg-white border-2 border-gray-200 text-gray-700 text-lg md:text-xl font-medium rounded-xl py-3 px-4 text-center cursor-pointer shadow-sm hover:shadow-md hover:border-blue-400 flex items-center justify-center min-h-[60px] select-none break-words';
            div.innerText = text;
            div.dataset.id = id;
            div.dataset.type = type;

            div.addEventListener('click', () => handleCardClick(div));
            return div;
        }

        // ==========================================
        // 游戏交互与校验
        // ==========================================
        function handleCardClick(card) {
            if (isLocked) return;
            if (card.classList.contains('match-hide')) return;

            card.classList.remove('hint-glow');

            const type = card.dataset.type;
            const text = card.innerText;

            if (type === 'en' || (type === 'zh' && isChineseAudioEnabled)) {
                speakText(text, type === 'en');
            }

            if (type === 'en') {
                if (selectedEnglishItem) selectedEnglishItem.classList.remove('selected');
                selectedEnglishItem = card;
                card.classList.add('selected');
            } else {
                if (selectedChineseItem) selectedChineseItem.classList.remove('selected');
                selectedChineseItem = card;
                card.classList.add('selected');
            }

            if (selectedEnglishItem && selectedChineseItem) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            const isMatch = selectedEnglishItem.dataset.id === selectedChineseItem.dataset.id;

            const elEn = selectedEnglishItem;
            const elZh = selectedChineseItem;

            if (isMatch) {
                showPraise();

                elEn.classList.remove('selected', 'hint-glow');
                elZh.classList.remove('selected', 'hint-glow');
                elEn.classList.add('match-success');
                elZh.classList.add('match-success');

                setTimeout(() => {
                    elEn.classList.add('match-hide');
                    elZh.classList.add('match-hide');
                    
                    roundMatchedCount++;
                    completedWordsCount++;
                    
                    document.getElementById('scoreDisplay').innerText = completedWordsCount;
                    updateProgressBar();
                    resetSelection();

                    if (roundMatchedCount === currentPairs.length) {
                        handleRoundComplete();
                    }
                }, 500); 

            } else {
                errorCount++;
                
                elEn.classList.remove('selected');
                elZh.classList.remove('selected');
                elEn.classList.add('match-error');
                elZh.classList.add('match-error');

                setTimeout(() => {
                    elEn.classList.remove('match-error');
                    elZh.classList.remove('match-error');
                    resetSelection();
                }, 800);
            }
        }

        function resetSelection() {
            selectedEnglishItem = null;
            selectedChineseItem = null;
            isLocked = false;
        }

        function updateProgressBar() {
            const percent = (completedWordsCount / targetWordCount) * 100;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        // ==========================================
        // 关卡流转处理与最终结算
        // ==========================================
        function handleRoundComplete() {
            isLocked = true;
            currentRoundIndex += 6;

            if (currentRoundIndex >= targetWordCount) {
                stopTimer();
                showWinScreen();
            } else {
                setTimeout(() => {
                    const transEl = document.getElementById('roundTransition');
                    transEl.classList.remove('hidden');
                    
                    setTimeout(() => {
                        transEl.classList.add('hidden');
                        startRound();
                    }, 1200);
                }, 300);
            }
        }

        function showWinScreen() {
            setTimeout(() => {
                document.getElementById('finalScore').innerText = targetWordCount;
                
                document.getElementById('finalTime').innerText = formatTime(elapsedSeconds);
                
                const totalAttempts = targetWordCount + errorCount;
                const accuracy = totalAttempts === 0 ? 100 : Math.round((targetWordCount / totalAttempts) * 100);
                document.getElementById('finalAccuracy').innerText = `${accuracy}%`;

                let grade = '';
                let gradeColor = '';
                if (accuracy >= 95) {
                    grade = 'S 级 🌟🌟🌟';
                    gradeColor = 'text-yellow-500';
                } else if (accuracy >= 85) {
                    grade = 'A 级 🌟🌟';
                    gradeColor = 'text-orange-500';
                } else if (accuracy >= 70) {
                    grade = 'B 级 🌟';
                    gradeColor = 'text-blue-500';
                } else {
                    grade = 'C 级 加油';
                    gradeColor = 'text-gray-500';
                }
                
                const gradeEl = document.getElementById('finalGrade');
                gradeEl.innerText = grade;
                gradeEl.className = `text-lg md:text-xl font-extrabold ${gradeColor}`;

                const formattedLevelName = levelNames[currentLevelKey] || '未知级别';
                const formattedTime = formatTime(elapsedSeconds);
                saveHistory(formattedLevelName, targetWordCount, formattedTime, accuracy, grade);

                document.getElementById('winScreen').classList.remove('hidden');
            }, 600);
        }

    </script>
